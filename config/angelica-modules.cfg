# Configuration file

general {
    # Enables PBR atlas dumping [default: false]
    B:"Enable PBR Debug"=false

    # List of sprites which should always be treated as translucent.
    # Sprites added to this list will always be considered translucent,
    # 
    # Requires texture reload (F3+T) to take effect. [default: [jewelrycraft2:blockCrystal]]
    S:alwaysTranslucentSprites <
        jewelrycraft2:blockCrystal
     >

    # Block corners and edges between chunks might have "cracks" (various lines/dots) in them.
    # While using "Compact Vertex Format" makes the situation even worse.
    # This option fixes it, though may lead to other visual artifacts.
    # Requires game restart after changing this option to take effect [default: false]
    B:blockCrackFix=false

    # Block classes that have bugs when rendering with the blockCrackFix can be put here to avoid manipulating them [default: [net.minecraft.block.BlockCauldron], [net.minecraft.block.BlockStairs]]
    S:blockCrackFixBlacklist <
        net.minecraft.block.BlockCauldron
        net.minecraft.block.BlockStairs
     >

    # The "epsilon" value for the blockCrackFix option. 
    # Set this a bit higher if you can still see lines/dots between solid blocks in dark areas.
    # May cause intense flickering (z-fighting) between blocks if the value is too high [range: 0.0 ~ 0.005, default: 0.001]
    D:blockCrackFixEpsilon=0.001

    # Block classes that have render pass other than 0 but still need to be manipulated.
    # Add a block class here if you see flickering (z-fighting) with blockCrackFix enabled [default: [gregtech.common.blocks.BlockOres], [gregtech.common.blocks.GTBlockOre], [shukaro.artifice.block.world.BlockOre], [bartworks.system.material.BWMetaGeneratedOres], [gtPlusPlus.core.block.base.BlockBaseOre], [org.pfaa.geologica.block.BrokenGeoBlock], [org.pfaa.geologica.block.BrickGeoBlock]]
    S:blockCrackFixRenderPassWhitelist__ <
        gregtech.common.blocks.BlockOres
        gregtech.common.blocks.GTBlockOre
        shukaro.artifice.block.world.BlockOre
        bartworks.system.material.BWMetaGeneratedOres
        gtPlusPlus.core.block.base.BlockBaseOre
        org.pfaa.geologica.block.BrokenGeoBlock
        org.pfaa.geologica.block.BrickGeoBlock
     >

    # Number of chunk builder threads. 0 = auto-detect, -1 = use single-threaded fallback [range: -1 ~ 16, default: 0]
    I:chunkBuilderThreadCount=0

    # Define IS_IRIS in shader macros. [default: true]
    B:defineIsIris=true

    # Disables GL Error checks. Always set to false in dev env or if LWJGL debug is on. Improves performance. [default: true]
    B:disableErrorChecks=true

    # Disables additional F3 information added by Angelica. [default: false]
    B:disableF3Additions=false

    # Disable automatic GL version pinning. When true, always probes from highest on every launch. [default: false]
    B:disableGLVersionPinning=false

    # Max amount of dropped item rendered [range: 32 ~ 2048, default: 256]
    I:droppedItemLimit=256

    # TileEntity classnames whose render bounds change at runtime (e.g. OpenBlocks Guide).
    # These are always rendered and frustum-tested against their live bounds instead of the cached. [default: [openblocks.common.tileentity.TileEntityGuide], [openblocks.common.tileentity.TileEntityBuilderGuide]]
    S:dynamicBoundsTileEntities <
        openblocks.common.tileentity.TileEntityGuide
        openblocks.common.tileentity.TileEntityBuilderGuide
     >

    # Dynamically modifies the render distance of dropped items entities to preserve performance. It starts reducing the render distance when exceeding the threshold set below. [default: true]
    B:dynamicItemRenderDistance=true

    # Convert &-prefix format codes (&#RRGGBB, &c, &l, etc.) at render time [default: true]
    B:enableAmpersandConversion=true

    # Enable Celeritas terrain rendering [default: true]
    B:enableCeleritas=true

    # Enables DSA (Direct State Access) for faster bindings. Disable if you notice terrible performance. [default: true]
    B:enableDSA=true

    # Enable Debug Logging [default: false]
    B:enableDebugLogging=false

    # Enable upside-down text (&v) [default: true]
    B:enableDinnerboneText=true

    # Enable per-segment drop shadow toggle (&u) and colored shadow (&u&#RRGGBB) [default: true]
    B:enableDropShadow=true

    # Enable Dynamic Lights [default: true]
    B:enableDynamicLights=true

    # Batch drawScreen fonts [default: true]
    B:enableFontRenderer=true

    # Enable gradient text (&g&#start&#end) [default: true]
    B:enableGradients=true

    # Register HardcodedCustomUniforms in Iris Shaders. May help with compatibility in certain shader packs [default: false]
    B:enableHardcodedCustomUniforms=false

    # Renders the HUD elements once per 20 frames (by default) and reuses the pixels to improve performance. [Experimental] [default: true]
    B:enableHudCaching=true

    # Inject a conditional early return into all RenderGameOverlayEvent receivers; Requires enableHudCaching [default: true]
    B:enableHudCachingEventTransformer=true

    # Enable Iris Shaders [Requires Celeritas] [default: true]
    B:enableIris=true

    # Enable MCPatcherForge features, still in Alpha. Individual features are toggled in mcpatcher.json [default: true]
    B:enableMCPatcherForgeFeatures=false

    # Enable NotFine features [default: true]
    B:enableNotFineFeatures=true

    # Enable NotFine Options [default: false]
    B:enableNotFineOptions=false

    # Replace main menu panorama with modern equivalent. [default: true]
    B:enablePanoramaBlurShader=true

    # Enable full RGB color support (16.7M colors) using &#RRGGBB syntax in text [default: true]
    B:enableRGBColors=true

    # Enable rainbow cycling text (&q) [default: true]
    B:enableRainbow=true

    # Enable Reese's Sodium Options [default: true]
    B:enableReesesSodiumOptions=true

    # Enable multi-threaded chunk building for improved performance [Requires Celeritas] [default: true]
    B:enableThreadedChunkBuilding=true

    # Uses cached attributes for VBO rendering, resulting in less CPU overhead. Disable if you notice any graphical issues. [default: true]
    B:enableVAO=true

    # Replace cloud renderer with a VBO version. [default: true]
    B:enableVBOClouds=true

    # Enable wave/bounce animated text (&z) [default: true]
    B:enableWaveText=true

    # Enable Zoom [default: true]
    B:enableZoom=true

    # Swap the vanilla damage overlay with one similar to modern. Fixes specific issues with z-fighting. [default: true]
    B:entityModernDamageOverlay=true

    # Fixes various issues with entity overlays, such as z-fighting and eyes. [default: true]
    B:entityOverlayFixes=true

    # Fix RenderBlockFluid reading the block type from the world access multiple times [default: true]
    B:fixFluidRendererCheckingBlockAgain=true

    # Hide downloading terrain screen. [From ArchaicFix] [default: true]
    B:hideDownloadingTerrainScreen=true

    # Enable HUD Caching at runtime. Requires enableHudCaching to be on at startup. [Experimental] [default: false]
    B:hudCachingActive=false

    # The amount of frames to wait before updating the HUD elements. [Experimental] [range: 1 ~ 60, default: 20]
    I:hudCachingFPS=20

    # Inject BakedModel rendering into some vanilla blocks [default: false]
    B:injectQPRendering=false

    # Upper limit for the amount of VBO's to cache for optimized item rendering. Higher number can potentially use more VRAM. [range: 256 ~ 1024, default: 512]
    I:itemRendererCacheSize=512

    # Render distance for the spinning mob inside mod spawners [range: 16.0 ~ 64.0, default: 16.0]
    D:mobSpawnerRenderDistance=16.0

    # Modern MC_VERSION to try if shader pack has no 1.7.10 section. 0 = default (260101) [range: 0 ~ 2147483647, default: 0]
    I:modernFallbackMcVersion=0

    # Tweak F3 screen to be closer to modern versions. [From ArchaicFix] [default: true]
    B:modernizeF3Screen=true

    # Optimizes in-world item rendering [default: true]
    B:optimizeInWorldItemRendering=true

    # Optimize Texture Loading. [From Hodgepodge] [default: true]
    B:optimizeTextureLoading=true

    # Optimize world update light. [From Hodgepodge] [default: true]
    B:optimizeWorldUpdateLight=true

    # Pinned OpenGL version an integer (e.g. 46, 41, 33). 0 = auto-detect. [33, 46]. (Disable with disableGLVersionPinning=true) [range: 0 ~ 46, default: 0]
    I:pinnedGLVersion=0

    # Allows unicode languages to use an odd gui scale [default: true]
    B:removeUnicodeEvenScaling=true

    # Replaces various FFP uploads with statically allocated VBO's. [default: true]
    B:replaceFFPUploads=true

    # Show block registry name and meta value in F3, similar to 1.8+. [From ArchaicFix] [default: true]
    B:showBlockDebugInfo=true

    # Show memory usage during game load. [From ArchaicFix] [default: true]
    B:showSplashMemoryBar=false

    # Switches to an alternate FPS limiter that gives more stable frametimes, in exchange for slightly more latency. Will never introduce more than one frame of latency, and has a lower impact at higher framerates. [default: false]
    B:sleepBeforeSwap=false

    # Optimize Texture Animations. [From Hodgepodge] [default: true]
    B:speedupAnimations=true

    # Use total world time instead of normal world time. Allows most shader animations to play when doDaylightCycle is off, but causes shader animations to desync from time of day. [default: false]
    B:useTotalWorldTime=false

    # Renders chunks before neighbors are ready. Improves loading at render distance edges, useful for low render distance servers. [default: false]
    B:useVanillaChunkTracking=false

    # Wave text amplitude (how far characters bounce) [range: 1.0 ~ 8.0, default: 2.0]
    S:waveAmplitude=2.0

    ##########################################################################################################
    # transformercompat
    #--------------------------------------------------------------------------------------------------------#
    # ASM transformer exclusion narrowing for mod compatibility. Disable per-mod if narrowing causes class loading issues.
    ##########################################################################################################

    transformercompat {
        # Narrow AdvancedLightsabers transformer exclusions to allow GL redirection [default: true]
        B:narrowAdvancedLightsabers=true

        # Narrow Alfheim transformer exclusions to allow GL redirection [default: true]
        B:narrowAlfheim=true

        # Narrow DragonAPI transformer exclusions to allow GL redirection [default: true]
        B:narrowDragonAPI=true

        # Narrow Ears transformer exclusions to allow GL redirection [default: true]
        B:narrowEars=true

        # Narrow Fisk's Superheroes transformer exclusions to allow GL redirection [default: true]
        B:narrowFiskHeroes=true

        # Narrow FoamFix transformer exclusions to allow GL redirection in its repackaged Ears [default: true]
        B:narrowFoamFix=true

        # Narrow Xaeros Minimap/Worldmap transformer exclusions to allow GL redirection [default: true]
        B:narrowXaeros=true
    }

}


